<div class="w-screen h-screen bg-slate-300 flex justify-start items-start">
    <div class="w-full h-full overflow-y-scroll">
        <table class="w-full table-auto">
            <thead class="text-sm text-white text-center items-center sticky top-0">
                <tr class="bg-slate-300">
                    <th colspan="9"><a class="bg-white text-black font-light px-2" routerLink="/">VOLVER</a></th>
                </tr>
                <tr class="bg-slate-900">
                    <th class="w-fit">CODIGO</th>
                    <th>NOMBRE</th>
                    <th>MARCA</th>
                    <th>STOCK</th>
                    <th>COMPRA</th>
                    <th>VENTA</th>
                    <th class="max-w-[80px]">PROVEEDOR</th>
                    <th class=""></th>
                </tr>
            </thead>
            <tbody class="text-center items-center">
                <tr class="bg-gray-200 border-y-1 text-sm">
                    <td class="py-1 max-w-[70px]. w-[90px] whitespace-normal.">
                        <input type="text" [(ngModel)]="codigoBusqueda" (ngModelChange)="filtrarPorCodigo()"
                            placeholder="BUSCAR" class="bg-white text-black text-center border-1.">
                    </td>
                    <td>
                        <input type="text" [(ngModel)]="terminoBusqueda" (ngModelChange)="filtrar()"
                            placeholder="BUSCAR" class="bg-white text-black text-center border-1.">
                    </td>
                    <td>
                        <input type="text" [(ngModel)]="marcaBusqueda" (ngModelChange)="filtrarPorMarca()"
                            placeholder="BUSCAR" class="bg-white text-black text-center border-1.">
                    </td>
                    <td colspan="5" class=""></td>

                </tr>
                @for (a of filtro; track a.codigo) {
                <tr [ngClass]="{
                    'bg-red-300 hover:bg-red-400': a.cantidad < 5,
                    'bg-gray-200 hover:bg-gray-400': a.cantidad >= 5
                }" class="border-y-1 text-sm">
                    <td class="px-1">{{a.codigo}}</td>
                    <td class="max-w-[150px] whitespace-normal">
                        {{a.nombre}}
                    </td>
                    <td class="">{{a.marca}}</td>
                    <td class="px-1">{{a.cantidad}}</td>
                    <td class="px-1">{{a.compra/100 | currency: ''}}</td>
                    <td class="px-1">{{a.venta/100 | currency: ''}}</td>
                    <td class="px-1 max-w-[80px] truncate" title="{{ a.proveedor }}">
                            {{ a.proveedor }}
                    </td>
                    <td class="py-2 flex flex-row justify-around content-center">
                        <button (click)="ver_articulo(a)" class="w-fit cursor-pointer hover:underline px-2">+</button>
                    </td>
                </tr>
                }
            </tbody>
        </table>
        @if(mensaje) {
        <app-info [msj]=mensaje (salida)="cerrarVentana()" />
        }
        @if(editar) {
        <app-editar [articulo]=editar (cerrar)="cerrarPopup()" (salida_editar)="crearMensaje('Articulo editado')"
            (salida)="crearMensaje('Articulo borrado')" />
        }
    </div>
</div>
